<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#17683a">
  <title>AgroLink — Offline</title>
  <link rel="stylesheet" href="{{OFFLINE_CSS}}">
  <script src="{{OFFLINE_JS}}" defer></script>
</head>
<body>
  <main class="offline-card">
    <h1>AgroLink is offline</h1>
    <p>
      An internet connection is required to view current produce listings,
      manage orders, send messages, or update your account.
    </p>
    <p>Please reconnect and try again.</p>
    <button type="button" data-offline-retry>Try again</button>
  </main>
</body>
</html>
